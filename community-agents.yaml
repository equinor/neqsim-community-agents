# NeqSim Community Agent Catalog Preview
#
# These entries are intended to support a future public catalog that can be
# consumed by the main NeqSim ecosystem.

catalog_version: "0.1"
last_updated: "2026-05-31"

agents:
  - name: pvt-agent
    version: "0.1.0"
    description: "Assists with fluid characterization, composition checks, phase behavior evaluation, and thermodynamic analysis."
    repo: "equinor/neqsim-community-agents"
    path: "agents/pvt-agent/AGENT.md"
    required_skills:
      - fluid-quality-check
    supported_domains:
      - pvt
      - thermodynamics
      - fluid-characterization

  - name: hydrate-screening-agent
    version: "0.1.0"
    description: "Performs preliminary hydrate risk assessment and recommends further analysis."
    repo: "equinor/neqsim-community-agents"
    path: "agents/hydrate-screening-agent/AGENT.md"
    required_skills:
      - hydrate-screening
    supported_domains:
      - flow-assurance
      - hydrates
      - screening

  - name: tie-in-screening-agent
    version: "0.1.0"
    description: "Provides early-stage screening of tie-in opportunities with fluid, flow assurance, and process checks."
    repo: "equinor/neqsim-community-agents"
    path: "agents/tie-in-screening-agent/AGENT.md"
    required_skills:
      - fluid-quality-check
      - hydrate-screening
      - separator-modelling
      - resource-classification-screening
    supported_domains:
      - field-development
      - tie-in-screening
      - flow-assurance
      - resource-classification

  - name: process-screening-agent
    version: "0.1.0"
    description: "Performs high-level process engineering screening studies and engineering checklist generation."
    repo: "equinor/neqsim-community-agents"
    path: "agents/process-screening-agent/AGENT.md"
    required_skills:
      - separator-modelling
    supported_domains:
      - process-engineering
      - process-screening
      - separator-screening

  - name: process-safety-agent
    version: "0.1.0"
    description: "Provides early-stage process safety screening for fire-case relief loads and emergency depressurization with public, educational methods."
    repo: "equinor/neqsim-community-agents"
    path: "agents/process-safety-agent/AGENT.md"
    required_skills:
      - relief-load-screening
      - depressurization-screening
      - flare-radiation-screening
      - psv-orifice-screening
      - safety-function-coverage-screening
    supported_domains:
      - process-safety
      - relief-screening
      - depressurization-screening
      - flare-radiation-screening
      - safety-function-screening

  - name: process-engineer-agent
    version: "0.1.0"
    description: "Provides early-stage process engineering screening that checks unit operations against public line-velocity and compressor operating-window guidelines."
    repo: "equinor/neqsim-community-agents"
    path: "agents/process-engineer-agent/AGENT.md"
    required_skills:
      - line-velocity-check
      - compressor-operating-window-check
      - pressure-drop-screening
      - fired-heater-duty-screening
    supported_domains:
      - process-engineering
      - operating-limits
      - standards-compliance

  - name: flow-assurance-engineer-agent
    version: "0.1.0"
    description: "Provides early-stage flow assurance screening that checks operating points against public hydrate-margin and wax-margin guidelines."
    repo: "equinor/neqsim-community-agents"
    path: "agents/flow-assurance-engineer-agent/AGENT.md"
    required_skills:
      - hydrate-margin-check
      - wax-margin-check
    supported_domains:
      - flow-assurance
      - operating-limits
      - standards-compliance

  - name: piping-integrity-agent
    version: "0.1.0"
    description: "Provides early-stage piping-integrity screening that checks main lines against public line-velocity, pressure-drop, wall-thickness, and flow-induced-vibration guidelines."
    repo: "equinor/neqsim-community-agents"
    path: "agents/piping-integrity-agent/AGENT.md"
    required_skills:
      - line-velocity-check
      - pressure-drop-screening
      - pipe-wall-thickness-screening
      - flow-induced-vibration-screening
    supported_domains:
      - process-engineering
      - piping-integrity
      - operating-limits
      - standards-compliance

  - name: gas-treatment-agent
    version: "0.1.0"
    description: "Provides early-stage gas-treatment screening that checks water dewpoint/dehydration and compressor power against public, educational guidelines."
    repo: "equinor/neqsim-community-agents"
    path: "agents/gas-treatment-agent/AGENT.md"
    required_skills:
      - water-dewpoint-dehydration-screening
      - compressor-power-screening
    supported_domains:
      - process-engineering
      - gas-treatment
      - dehydration
      - standards-compliance

  - name: subsea-layout-screening-agent
    version: "0.1.0"
    description: "Coordinates early-stage subsea layout screening that turns a supplied subsea map into a well and tie-back inventory with step-out distances, route profiles, and seabed slope flags."
    repo: "equinor/neqsim-community-agents"
    path: "agents/subsea-layout-screening-agent/AGENT.md"
    required_skills:
      - field-layout-import
      - subsea-layout-geometry
      - bathymetry-profile-screening
      - pipe-route-profile
    supported_domains:
      - field-development
      - subsea-layout
      - tie-in-screening
      - flow-assurance

  - name: reservoir-to-facility-screening-agent
    version: "0.1.0"
    description: "Coordinates early-stage reservoir-to-facility production screening that chains reservoir depletion versus time, well inflow, manifold routing, and flowline/riser pressure drop into a platform arrival-pressure roll-up with time development."
    repo: "equinor/neqsim-community-agents"
    path: "agents/reservoir-to-facility-screening-agent/AGENT.md"
    required_skills:
      - reservoir-depletion-screening
      - production-network-routing
      - subsea-layout-geometry
      - step-out-screening
    supported_domains:
      - field-development
      - reservoir-engineering
      - production-technology
      - subsea-layout
      - flow-assurance

  - name: pipe-route-screening-agent
    version: "0.1.0"
    description: "Coordinates early-stage pipe-route screening that builds a route elevation profile and checks arrival pressure drop, line velocity, and hydrate margin against public guidelines."
    repo: "equinor/neqsim-community-agents"
    path: "agents/pipe-route-screening-agent/AGENT.md"
    required_skills:
      - pipe-route-profile
      - pressure-drop-screening
      - line-velocity-check
      - hydrate-margin-check
    supported_domains:
      - flow-assurance
      - process-engineering
      - pipeline-hydraulics
      - operating-limits