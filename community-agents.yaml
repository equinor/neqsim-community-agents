# NeqSim Community Agent Catalog Preview
#
# These entries are intended to support a future public catalog that can be
# consumed by the main NeqSim ecosystem.

catalog_version: "0.1"
last_updated: "2026-06-25"

agents:
  - name: pvt-agent
    version: "0.1.0"
    description: "Assists with fluid characterization, composition checks, phase behavior evaluation, and thermodynamic analysis."
    repo: "equinor/neqsim-community-agents"
    path: "agents/pvt-agent/AGENT.md"
    required_skills:
      - fluid-quality-check
    supported_domains:
      - pvt
      - thermodynamics
      - fluid-characterization

  - name: e300-fluid-agent
    version: "0.1.0"
    description: "Reads Eclipse E300 files into NeqSim fluids, writes NeqSim fluids to E300, and adds water with the public PVTsim water parameters."
    repo: "equinor/neqsim-community-agents"
    path: "agents/e300-fluid-agent/AGENT.md"
    required_skills:
      - e300-fluid-io
    supported_domains:
      - pvt
      - thermodynamics
      - fluid-io

